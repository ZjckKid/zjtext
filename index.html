<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextDrop</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Martian+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e0e; --text: #f0ede6; --accent: #c8f04a; --muted: #444; --border: #222; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 2rem;
    }
    .message {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 5rem);
      line-height: 1.2; text-align: center;
      max-width: 900px; letter-spacing: -0.01em;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }
    .back {
      position: fixed; bottom: 1.5rem; right: 1.8rem;
      font-family: 'Martian Mono', monospace;
      font-size: 0.6rem; color: #444;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .back a { color: #c8f04a; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
    .home { display: flex; flex-direction: column; align-items: center; gap: 2rem; width: 100%; font-family: 'Martian Mono', monospace; }
    h1 {
      font-family: 'Instrument Serif', Georgia, serif; font-style: italic;
      font-size: clamp(2.5rem, 6vw, 4.5rem); letter-spacing: -0.02em;
      text-align: center; animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    h1 span { color: #c8f04a; }
    .sub { font-size: 0.65rem; color: #444; letter-spacing: 0.06em; text-transform: uppercase; animation: fadeUp 0.5s 0.1s cubic-bezier(0.16,1,0.3,1) both; }
    .box {
      display: flex; width: 100%; max-width: 600px;
      border: 1px solid #222; border-radius: 4px; overflow: hidden;
      animation: fadeUp 0.5s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    input {
      flex: 1; background: #161616; border: none; outline: none;
      color: #f0ede6; font-family: 'Martian Mono', monospace;
      font-size: 0.8rem; padding: 0.9rem 1rem;
    }
    input::placeholder { color: #444; }
    button {
      background: #c8f04a; color: #0e0e0e; border: none;
      padding: 0.9rem 1.4rem; font-family: 'Martian Mono', monospace;
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.05em;
      cursor: pointer; text-transform: uppercase; transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .preview {
      font-size: 0.6rem; color: #444; width: 100%; max-width: 600px;
      word-break: break-all; animation: fadeUp 0.5s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    .preview b { color: #c8f04a; font-weight: 400; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const text = new URLSearchParams(location.search).get('text');
    const app = document.getElementById('app');
    if (text) {
      const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      document.title = safe;
      app.innerHTML = '<p class="message">' + safe + '</p>';
      document.body.insertAdjacentHTML('beforeend','<div class="back"><a href="./">← make your own</a></div>');
    } else {
      app.innerHTML = `
        <div class="home">
          <h1>Text<span>Drop</span></h1>
          <p class="sub">share any text as a link</p>
          <div class="box">
            <input id="inp" type="text" placeholder="Type anything..." />
            <button onclick="go()">Open →</button>
          </div>
          <p class="preview" id="prev"><span style="color:#444">your link will appear here</span></p>
        </div>`;
      document.getElementById('inp').addEventListener('input', () => {
        const v = document.getElementById('inp').value;
        const prev = document.getElementById('prev');
        if (!v) { prev.innerHTML = '<span style="color:#444">your link will appear here</span>'; return; }
        prev.innerHTML = '<b>' + location.origin + location.pathname + '?text=' + encodeURIComponent(v) + '</b>';
      });
      document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
    }
    function go() {
      const v = document.getElementById('inp').value.trim();
      if (v) location.href = '?text=' + encodeURIComponent(v);
    }
  </script>
</body>
</html>
